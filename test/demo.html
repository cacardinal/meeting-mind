<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetingMind Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
</head>
<body class="dark bg-gray-950 text-gray-100">
  <div id="root" style="width: 400px; height: 700px; margin: 20px auto; border: 1px solid #374151; border-radius: 8px; overflow: hidden;">
  </div>

  <script type="module">
    // Demo data simulating a live interview
    const DEMO_TRANSCRIPT = [
      { speaker: 0, label: "Dan (Interviewer)", text: "Thanks for joining, Jane. I've been looking forward to this conversation." },
      { speaker: 1, label: "You", text: "Thanks Dan, really excited to be here. I've been following the company's work in this space." },
      { speaker: 0, label: "Dan (Interviewer)", text: "Tell me about a time you scaled a product team while maintaining velocity. What was your approach?" },
      { speaker: 1, label: "You", text: "Great question. At Acme Health, I inherited a team of 4 and needed to scale rapidly..." },
    ];

    const DEMO_SUGGESTION = {
      framework: "STAR Framework",
      text: `**Situation:** Acme Health product team, 4 engineers, single-threaded delivery

**Task:** Scale team 3x while maintaining sprint velocity and quality

**Action:** Introduced pod structure (3 pods of 4), hired 3 PMs with domain expertise, established OKR cadence with quarterly planning

**Result:** 3x feature output within 6 months, NPS improved 72→84, zero critical production incidents during scale-up`,
    };

    // Render the demo UI
    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="h-full flex flex-col bg-gray-950 text-gray-100">
        <!-- Header -->
        <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
          <h1 class="text-lg font-semibold tracking-tight">MeetingMind</h1>
          <div class="flex gap-2">
            <button class="px-3 py-1 text-sm bg-red-600 hover:bg-red-700 rounded-md transition-colors">Stop</button>
            <button class="p-1.5 text-gray-400 hover:text-gray-200 transition-colors" title="Settings">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </header>

        <!-- Status bar -->
        <div class="px-4 py-2 border-b border-gray-800 flex items-center gap-2 text-sm">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-gray-400">Recording</span>
          <span class="ml-auto text-gray-500 truncate">Acme Health — Final Round Interview</span>
        </div>

        <!-- Context bar -->
        <div class="px-4 py-2 border-b border-gray-800">
          <div class="flex gap-2 text-xs">
            <span class="px-2 py-0.5 bg-blue-950 border border-blue-800 rounded-full text-blue-300">Interview</span>
            <span class="px-2 py-0.5 bg-gray-900 border border-gray-700 rounded-full text-gray-400">STAR</span>
            <span class="px-2 py-0.5 bg-gray-900 border border-gray-700 rounded-full text-gray-400">Pyramid</span>
          </div>
        </div>

        <!-- Transcript -->
        <div id="transcript" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
        </div>

        <!-- Suggestion -->
        <div id="suggestion-area" class="border-t border-gray-800 max-h-[40%] overflow-y-auto" style="display:none">
          <div class="px-4 py-2 text-xs font-medium text-gray-500 uppercase tracking-wider">Suggestion</div>
        </div>

        <!-- Hotkey hint -->
        <div class="px-4 py-2 border-t border-gray-800 text-xs text-gray-600 text-center">
          Ctrl+Space: Get suggestion &middot; Ctrl+E: Export
        </div>
      </div>
    `;

    // Animate transcript appearing
    const transcriptEl = document.getElementById('transcript');
    const suggestionArea = document.getElementById('suggestion-area');
    let segmentIndex = 0;

    function addSegment() {
      if (segmentIndex >= DEMO_TRANSCRIPT.length) {
        // Show suggestion after all transcript is done
        setTimeout(showSuggestion, 800);
        return;
      }

      const seg = DEMO_TRANSCRIPT[segmentIndex];
      const div = document.createElement('div');
      div.innerHTML = `
        <button class="text-xs font-medium ${seg.speaker === 0 ? 'text-blue-400' : 'text-emerald-400'} mb-0.5">${seg.label}</button>
        <p class="text-sm text-gray-200 leading-relaxed">${seg.text}</p>
      `;
      div.style.opacity = '0';
      div.style.transform = 'translateY(8px)';
      div.style.transition = 'opacity 0.3s, transform 0.3s';
      transcriptEl.appendChild(div);

      requestAnimationFrame(() => {
        div.style.opacity = '1';
        div.style.transform = 'translateY(0)';
      });

      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      segmentIndex++;
      setTimeout(addSegment, 1500);
    }

    function showSuggestion() {
      suggestionArea.style.display = 'block';
      const card = document.createElement('div');
      card.className = 'mx-4 mb-3 p-3 rounded-lg border border-gray-800 bg-gray-900';
      card.innerHTML = `
        <div class="text-xs font-medium text-emerald-400 mb-1.5">${DEMO_SUGGESTION.framework}</div>
        <div class="text-sm text-gray-200 whitespace-pre-wrap leading-relaxed" id="suggestion-text"></div>
        <div class="flex gap-2 mt-2">
          <button class="text-xs text-gray-500 hover:text-gray-300 transition-colors">Dismiss</button>
          <button class="text-xs text-gray-500 hover:text-blue-400 transition-colors">Pin</button>
          <button class="text-xs text-gray-500 hover:text-gray-300 transition-colors">Copy</button>
        </div>
      `;
      suggestionArea.appendChild(card);

      // Simulate streaming effect
      const textEl = document.getElementById('suggestion-text');
      let charIndex = 0;
      const text = DEMO_SUGGESTION.text;

      function typeChar() {
        if (charIndex >= text.length) return;
        textEl.innerHTML = text.substring(0, charIndex + 1).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        charIndex += 3; // type 3 chars at a time for speed
        setTimeout(typeChar, 20);
      }
      typeChar();
    }

    // Start the demo after a brief delay
    setTimeout(addSegment, 500);
  </script>
</body>
</html>
